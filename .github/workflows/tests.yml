name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Install Jing (RelaxNG validator)
      run: sudo apt-get update && sudo apt-get install --no-install-recommends --no-install-suggests -y jing

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Build schema
      run: bash scripts/build-schema.sh

    - name: Run tests with coverage
      run: |
        uv run coverage run -m unittest discover -s opensiddur/tests -v
        uv run coverage report -m
        uv run coverage xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
