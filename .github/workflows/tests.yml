name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Install Jing (RelaxNG validator)
      run: sudo apt-get update && sudo apt-get install --no-install-recommends --no-install-suggests -y jing

    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --all-groups

    - name: Build schema
      run: bash scripts/build-schema.sh

    - name: Run tests with coverage
      run: |
        uv run coverage run -m unittest discover -s opensiddur/tests -v
        uv run coverage report -m
        uv run coverage xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
